apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-user-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-user-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: devops-user-app
    spec:
      containers:
      - name: devops-user-app
        image: harshini1121/devops-user-app:latest
        ports:
        - containerPort: 3000

        # PVC Mount
        volumeMounts:
        - mountPath: "/data"
          name: storage

      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: devops-user-pvc
